<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Horizon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #313244;
    }

    header img {
      width: 24px;
      height: 24px;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #cdd6f4;
    }

    .info-box {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .info-box p {
      font-size: 12px;
      line-height: 1.6;
      color: #a6adc8;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #313244;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 600;
      color: #cdd6f4;
      width: fit-content;
    }

    footer {
      padding: 10px 16px;
      font-size: 10px;
      color: #45475a;
      border-top: 1px solid #313244;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="" />
    <h1>Gemini Horizon</h1>
  </header>

  <div class="info-box">
    <div class="badge"><img src="assets/logo.png" alt="Gemini Horizon" style="width:18px;height:18px;vertical-align:middle;"></div>
    <p>Settings have moved in-page. Open <strong>gemini.google.com</strong> and click the <img src="assets/logo.png" alt="Gemini Horizon" style="width:14px;height:14px;vertical-align:middle;"> button in the top bar to toggle Full Width Mode.</p>
  </div>

  <footer>gemini.google.com</footer>
</body>
</html>
